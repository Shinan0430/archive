<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI会話ログ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0b; --surface: #111113; --surface2: #18181b;
  --border: #2a2a2e; --accent: #7c6af7; --accent2: #a78bfa;
  --text: #e4e4e7; --muted: #71717a;
  --success: #34d399; --error: #f87171; --topbar: 52px;
  --chatgpt: #10a37f; --grok: #1d9bf0; --deepseek: #4f8ef7;
  --claude: #c96442; --dola: #e040fb;
  --highlight: #fbbf24;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

#pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; transition: opacity 0.3s; }
#pw-screen.hidden { opacity: 0; pointer-events: none; }
.pw-logo { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; }
.pw-title { font-size: 22px; font-weight: 300; letter-spacing: 1px; }
.pw-box { display: flex; flex-direction: column; gap: 12px; width: min(320px, 88vw); }
.pw-input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: 'JetBrains Mono', monospace; letter-spacing: 3px; outline: none; transition: border-color 0.2s; }
.pw-input:focus { border-color: var(--accent); }
.pw-input.error { border-color: var(--error); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.pw-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
.pw-btn:active { opacity: 0.8; }
.pw-err { font-size: 12px; color: var(--error); text-align: center; height: 16px; }

.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; gap: 8px; z-index: 100; }
.menu-btn { width: 36px; height: 36px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; border-radius: 6px; }
.menu-btn span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
.menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.menu-btn.open span:nth-child(2) { opacity: 0; }
.menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.topbar-title { flex: 1; font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.topbar-actions { display: flex; gap: 5px; flex-shrink: 0; }
.btn { padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; white-space: nowrap; }
.btn:active { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: default; }

#progress-bar-wrap { position: fixed; top: var(--topbar); left: 0; right: 0; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 14px; z-index: 99; display: none; flex-direction: column; gap: 6px; }
#progress-bar-wrap.show { display: flex; }
.progress-label { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s; width: 0%; }

.sidebar-overlay { position: fixed; inset: 0; top: var(--topbar); background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.sidebar-overlay.open { opacity: 1; pointer-events: all; }
.sidebar { position: fixed; top: var(--topbar); left: 0; width: min(320px, 88vw); height: calc(100% - var(--topbar)); background: var(--surface); border-right: 1px solid var(--border); overflow: hidden; z-index: 95; transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
.sidebar.open { transform: translateX(0); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.search-input { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-mode { display: flex; gap: 8px; }
.search-mode label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; cursor: pointer; }
.search-mode input[type="radio"] { accent-color: var(--accent); width: 14px; height: 14px; }

.filter-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab { padding: 8px 10px; font-size: 11px; cursor: pointer; color: var(--muted); white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; flex-shrink: 0; }
.ftab.active { color: var(--text); border-bottom-color: var(--accent); }
.ftab .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

.file-list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }
.sidebar-empty { padding: 24px 16px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.8; }
.list-pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.list-page-btn { width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.list-page-btn:active { background: var(--border); }
.list-page-btn:disabled { opacity: 0.3; cursor: default; }
.list-page-info { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; min-width: 60px; text-align: center; }

.file-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.file-item:active, .file-item.active { background: var(--surface2); }
.file-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.ai-badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; font-weight: 500; }
.file-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-item.active .file-name { color: var(--accent2); }
.file-date { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
.search-snippets { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
.search-snippet { font-size: 11px; line-height: 1.6; color: var(--muted); padding: 4px 0; }
.search-snippet .highlight { background: var(--highlight); color: #000; padding: 1px 2px; border-radius: 2px; font-weight: 500; }
.search-more { font-size: 10px; color: var(--accent2); margin-top: 4px; cursor: pointer; }
.snippet-page { font-size: 10px; color: var(--accent2); margin-left: 6px; opacity: 0.8; }
.search-stats { font-size: 11px; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface2); }

.ai-chatgpt  { background: rgba(16,163,127,0.15); color: var(--chatgpt); }
.ai-grok     { background: rgba(29,155,240,0.15); color: var(--grok); }
.ai-deepseek { background: rgba(79,142,247,0.15); color: var(--deepseek); }
.ai-claude   { background: rgba(201,100,66,0.15); color: var(--claude); }
.ai-dola     { background: rgba(224,64,251,0.15); color: var(--dola); }
.ai-other    { background: rgba(113,113,122,0.15); color: var(--muted); }

.main { position: fixed; top: var(--topbar); left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; transition: top 0.2s; }
.main.with-progress { top: calc(var(--topbar) + 52px); }

.page-nav { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); display: none; align-items: center; justify-content: space-between; padding: 8px 10px; gap: 6px; }
.page-nav.show { display: flex; }
.nav-btn { width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.nav-btn:active { background: var(--border); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.edge { font-size: 12px; }
.page-info { font-size: 12px; color: var(--muted); text-align: center; flex: 1; font-family: 'JetBrains Mono', monospace; }
.page-title { font-size: 11px; color: var(--muted); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.viewer-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.viewer { padding: 16px 14px 40px; font-size: 13px; line-height: 1.9; color: var(--text); }

.placeholder { height: 100%; min-height: calc(100vh - var(--topbar)); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); padding: 40px 20px; text-align: center; }
.placeholder-icon { font-size: 36px; opacity: 0.4; }
.placeholder-text { font-size: 14px; line-height: 1.7; }

.msg-block { margin-bottom: 18px; }
.msg-user { background: var(--surface2); border-radius: 10px; padding: 12px 14px; }
.msg-user-label { font-size: 10px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; letter-spacing: 1px; }
.msg-ai { padding: 12px 0; border-bottom: 1px solid var(--border); }
.msg-ai-label { font-size: 10px; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
.msg-text { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.85; }
.msg-text .highlight { background: var(--highlight); color: #000; padding: 1px 2px; border-radius: 2px; font-weight: 500; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; transition: transform 0.3s, opacity 0.3s; opacity: 0; white-space: nowrap; max-width: 88vw; overflow: hidden; text-overflow: ellipsis; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.success { border-color: var(--success); color: var(--success); }
#toast.error { border-color: var(--error); color: var(--error); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hit-panel { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); max-height: 240px; display: flex; flex-direction: column; }
.hit-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.hit-panel-title { font-size: 11px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
.hit-panel-toggle { font-size: 10px; color: var(--muted); }
.hit-panel-list { overflow-y: auto; flex: 1; }
.hit-panel.collapsed .hit-panel-list { display: none; }
.hit-panel.collapsed { max-height: none; }
.hit-item { padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; gap: 8px; align-items: flex-start; transition: background 0.15s; }
.hit-item:active { background: var(--surface2); }
.hit-item-page { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent2); flex-shrink: 0; padding-top: 2px; min-width: 32px; }
.hit-item-text { font-size: 11px; color: var(--muted); line-height: 1.6; word-break: break-word; flex: 1; }
.hit-item-text .highlight { background: var(--highlight); color: #000; padding: 1px 2px; border-radius: 2px; font-weight: 500; }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-logo">AI LOG VIEWER</div>
  <div class="pw-title">パスワードを入力</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="password" autocomplete="off">
    <div class="pw-err" id="pw-err"></div>
    <button class="pw-btn" onclick="checkPassword()">ロック解除</button>
  </div>
</div>

<div class="topbar">
  <div class="menu-btn" id="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  <div class="topbar-title" id="topbar-title">AI会話ログ</div>
  <div class="topbar-actions">
    <input type="file" id="zipInput" accept=".zip" multiple hidden>
    <button class="btn primary" id="zip-btn" onclick="document.getElementById('zipInput').click()">ZIP</button>
    <button class="btn" onclick="clearAll()">全削除</button>
  </div>
</div>

<div id="progress-bar-wrap">
  <div class="progress-label" id="progress-label">処理中…</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <div class="search-box">
    <input class="search-input" id="search-input" placeholder="🔍 検索...">
    <div class="search-mode">
      <label><input type="radio" name="searchMode" value="title" checked> タイトルのみ</label>
      <label><input type="radio" name="searchMode" value="content"> 内容も検索</label>
    </div>
  </div>
  <div class="filter-tabs">
    <div class="ftab active" data-ai="all"      onclick="setFilter('all')">すべて</div>
    <div class="ftab" data-ai="chatgpt"  onclick="setFilter('chatgpt')"><span class="dot" style="background:var(--chatgpt)"></span>ChatGPT</div>
    <div class="ftab" data-ai="grok"     onclick="setFilter('grok')"><span class="dot" style="background:var(--grok)"></span>Grok</div>
    <div class="ftab" data-ai="deepseek" onclick="setFilter('deepseek')"><span class="dot" style="background:var(--deepseek)"></span>DeepSeek</div>
    <div class="ftab" data-ai="claude"   onclick="setFilter('claude')"><span class="dot" style="background:var(--claude)"></span>Claude</div>
    <div class="ftab" data-ai="dola"     onclick="setFilter('dola')"><span class="dot" style="background:var(--dola)"></span>Dola</div>
  </div>
  <div id="search-stats" class="search-stats" style="display:none;"></div>
  <div class="file-list-wrap" id="file-list-wrap">
    <div id="file-list" style="flex:1"></div>
    <div class="list-pagination" id="list-pagination"></div>
  </div>
</div>

<div class="main" id="main">
  <div class="page-nav" id="page-nav">
    <button class="nav-btn edge" id="btn-first" onclick="changePage('first')" title="最初のページ">|←</button>
    <button class="nav-btn" id="btn-prev"  onclick="changePage(-1)"     title="前のページ">←</button>
    <div style="flex:1;text-align:center;min-width:0">
      <div class="page-info"      id="page-info"></div>
      <div class="page-title"     id="page-title-nav"></div>
    </div>
    <button class="nav-btn" id="btn-next"  onclick="changePage(1)"      title="次のページ">→</button>
    <button class="nav-btn edge" id="btn-last"  onclick="changePage('last')"  title="最後のページ">→|</button>
  </div>
  <div class="hit-panel" id="hit-panel" style="display:none;">
    <div class="hit-panel-header" onclick="toggleHitPanel()">
      <span class="hit-panel-title" id="hit-panel-title">ヒット一覧</span>
      <span class="hit-panel-toggle" id="hit-panel-toggle">▲</span>
    </div>
    <div class="hit-panel-list" id="hit-panel-list"></div>
  </div>
  <div class="viewer-wrap" id="viewer-wrap">
    <div id="viewer">
      <div class="placeholder">
        <div class="placeholder-icon">📂</div>
        <div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PASS         = "ai-shinan";
const SUPABASE_URL = "https://mtprohzzgfdohlxvfpwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_9jqBvmC7d8VxewxbzAHeYA_SoTmobit";
const TABLE        = "logs";
const BATCH_SIZE   = 5;
const RETRY_MAX    = 3;
const RETRY_DELAY  = 600;
const LIST_PAGE_SIZE = 100;

const AI_RULES = [
  { key: "chatgpt",  patterns: [/^CG-/i, /chatgpt/i],                              label: "ChatGPT",  cssClass: "ai-chatgpt" },
  { key: "grok",     patterns: [/^(?:X\d+-)?Grok[-_ ]/i, /^Grok[-_ ]/i, /Grok/i], label: "Grok",     cssClass: "ai-grok" },
  { key: "deepseek", patterns: [/^DS-/i, /deepseek/i],                              label: "DeepSeek", cssClass: "ai-deepseek" },
  { key: "claude",   patterns: [/^C-/i, /claude/i],                                 label: "Claude",   cssClass: "ai-claude" },
  { key: "dola",     patterns: [/^Dola-/i, /dola/i],                                label: "Dola",     cssClass: "ai-dola" },
];

const AI_SPEAKER_LABELS = ["ChatGPT", "Grok", "Claude", "DeepSeek", "Dola"];

function detectAI(title) {
  if (!title) return { key: "other", label: "Other", cssClass: "ai-other" };
  let base = title.replace(/\.(txt|md|log)$/i, "");
  for (const r of AI_RULES) {
    for (const pattern of r.patterns) {
      if (pattern.test(base)) return r;
    }
  }
  if (/grok/i.test(base)) return { key: "grok", label: "Grok", cssClass: "ai-grok" };
  return { key: "other", label: "Other", cssClass: "ai-other" };
}

function aiInfo(key) {
  return AI_RULES.find(r => r.key === key) || { key: "other", label: "Other", cssClass: "ai-other" };
}

function extractSortKey(title) {
  const matches = title.match(/(\d+)/g);
  if (!matches) return 0;
  const lastNum  = parseInt(matches[matches.length - 1], 10);
  const firstNum = matches.length > 1 ? parseInt(matches[0], 10) : 0;
  return firstNum * 10000 + lastNum;
}

// Supabase
const SB_H = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...opts, headers: { ...SB_H, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  return ct.includes("json") ? res.json() : null;
}
async function sbGetAll() {
  let allRows = [], offset = 0;
  while (true) {
    const rows = await sbFetch(`${TABLE}?select=id,title,ai_type,created_at&limit=1000&offset=${offset}`) || [];
    allRows = allRows.concat(rows);
    if (rows.length < 1000) break;
    offset += 1000;
  }
  allRows.sort((a, b) => extractSortKey(a.title) - extractSortKey(b.title));
  return allRows;
}
async function sbGetOne(id) {
  const rows = await sbFetch(`${TABLE}?id=eq.${id}&select=title,content,ai_type`) || [];
  return rows[0] || null;
}
const sbDeleteAll = () => sbFetch(`${TABLE}?id=gt.0`, { method: "DELETE", headers: { "Prefer": "return=minimal" } });

let titleCache = null;
const contentCache = new Map();
let contentCacheInitialized = false;
let contentLoadingPromise = null;
let searchAbortController = null;

async function ensureTitleCache() {
  if (titleCache !== null) return;
  let all = [], offset = 0;
  while (true) {
    const rows = await sbFetch(`${TABLE}?select=id,title&limit=1000&offset=${offset}`) || [];
    all = all.concat(rows);
    if (rows.length < 1000) break;
    offset += 1000;
  }
  titleCache = {};
  for (const r of all) titleCache[r.title] = r.id;
}

async function preloadAllContents() {
  if (contentCacheInitialized) return;
  if (contentLoadingPromise) return contentLoadingPromise;
  
  contentLoadingPromise = (async () => {
    const ids = allFiles.map(f => f.id).filter(id => !contentCache.has(id));
    if (ids.length === 0) {
      contentCacheInitialized = true;
      return;
    }
    
    const batchSize = 100;
    for (let i = 0; i < ids.length; i += batchSize) {
      const batch = ids.slice(i, i + batchSize);
      const idsStr = batch.join(',');
      try {
        const rows = await sbFetch(`${TABLE}?id=in.(${idsStr})&select=id,content`) || [];
        for (const row of rows) {
          contentCache.set(row.id, row.content);
        }
      } catch (e) {
        console.warn('バッチ読み込みエラー:', e);
      }
    }
    contentCacheInitialized = true;
  })();
  
  return contentLoadingPromise;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function sbUpsertSafe(title, content, ai_type) {
  for (let attempt = 0; attempt <= RETRY_MAX; attempt++) {
    try {
      await ensureTitleCache();
      const existingId = titleCache[title];
      if (existingId) {
        await sbFetch(`${TABLE}?id=eq.${existingId}`, { method: "PATCH", headers: { "Prefer": "return=minimal" }, body: JSON.stringify({ content, ai_type, created_at: new Date().toISOString() }) });
        contentCache.set(existingId, content);
      } else {
        const result = await sbFetch(TABLE, { method: "POST", headers: { "Prefer": "return=representation" }, body: JSON.stringify({ title, content, ai_type }) });
        if (result?.[0]?.id) {
          titleCache[title] = result[0].id;
          contentCache.set(result[0].id, content);
        }
      }
      return true;
    } catch (err) {
      if (attempt < RETRY_MAX) await sleep(RETRY_DELAY * (attempt + 1));
      else { console.error(`保存失敗: ${title}`, err.message); return false; }
    }
  }
  return false;
}

// 検索機能
function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, query) {
  if (!query) return escHtml(text);
  const escaped = escapeRegex(query);
  const regex = new RegExp(`(${escaped})`, 'gi');
  return escHtml(text).replace(regex, '<span class="highlight">$1</span>');
}

function getSnippetAroundMatch(content, query, maxLines = 3) {
  if (!query || !content) return [];
  const lines = content.split('\n');
  const queryLower = query.toLowerCase();
  const snippets = [];
  const seen = new Set();

  // 各行が何ページ目かを事前計算
  const pageMarker = /^私[：:]\s*/;
  const linePageMap = [];
  let pageNum = 0;
  for (const l of lines) {
    if (pageMarker.test(l)) pageNum++;
    linePageMap.push(pageNum);
  }
  
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].toLowerCase().includes(queryLower)) {
      const start = Math.max(0, i - 1);
      const end = Math.min(lines.length, i + 2);
      const key = `${start}-${end}`;
      if (!seen.has(key)) {
        seen.add(key);
        const snippetLines = lines.slice(start, end);
        const snippet = snippetLines.join('\n');
        snippets.push({
          text: snippet,
          lineNum: i + 1,
          page: linePageMap[i],
          highlighted: highlightText(snippet, query)
        });
      }
      if (snippets.length >= 999) break;
    }
  }
  return snippets;
}

async function searchContentFast(query) {
  if (searchAbortController) {
    searchAbortController.abort();
  }
  searchAbortController = new AbortController();
  const signal = searchAbortController.signal;
  
  const queryLower = query.toLowerCase();
  const results = [];
  
  const batchSize = 50;
  let processed = 0;
  
  for (let i = 0; i < allFiles.length; i += batchSize) {
    if (signal.aborted) return [];
    
    const batch = allFiles.slice(i, i + batchSize);
    
    for (const file of batch) {
      if (signal.aborted) break;
      
      const content = contentCache.get(file.id);
      if (!content) continue;
      
      if (content.toLowerCase().includes(queryLower)) {
        const snippets = getSnippetAroundMatch(content, query);
        if (snippets.length > 0) {
          results.push({ ...file, snippets, matchCount: snippets.length });
        }
      }
    }
    
    processed += batch.length;
    const progress = Math.round((processed / allFiles.length) * 100);
    document.getElementById("search-stats").textContent = `検索中... ${progress}% (${results.length}件ヒット)`;
    
    await new Promise(r => setTimeout(r, 10));
  }
  
  if (signal.aborted) return [];
  return results.sort((a, b) => b.matchCount - a.matchCount);
}

// ファイルリスト
let allFiles = [];
let filteredFiles = [];
let searchResults = [];
let listPage = 0;
let currentFilter = "all";
let currentSearch = "";
let activeFileId = null;
let isSearching = false;
let searchDebounceTimer = null;

async function loadList() {
  try {
    allFiles = await sbGetAll();
    contentCacheInitialized = false;
    contentLoadingPromise = null;
    applyFilter();
  } catch(e) {
    showToast("読み込み失敗: " + e.message, "error");
  }
}

async function applyFilter() {
  const q = currentSearch.trim();
  const mode = document.querySelector('input[name="searchMode"]:checked')?.value || 'title';
  
  if (searchAbortController) {
    searchAbortController.abort();
    searchAbortController = null;
  }
  
  let aiFiltered = allFiles.filter(f => {
    const aiMatch = currentFilter === "all" || f.ai_type === currentFilter;
    const titleMatch = !q || f.title.toLowerCase().includes(q.toLowerCase());
    return aiMatch && (mode === 'title' ? titleMatch : true);
  });
  
  if (mode === 'content' && q) {
    isSearching = true;
    document.getElementById("search-stats").style.display = "block";
    document.getElementById("search-stats").textContent = "コンテンツ読み込み中...";
    renderFileList();
    
    await preloadAllContents();
    
    searchResults = await searchContentFast(q);
    
    if (!searchAbortController?.signal.aborted) {
      const filteredResults = searchResults.filter(f => {
        const aiMatch = currentFilter === "all" || f.ai_type === currentFilter;
        return aiMatch;
      });
      
      filteredFiles = filteredResults;
      document.getElementById("search-stats").textContent = 
        `${filteredFiles.length}件のファイルに一致 (${searchResults.length}件ヒット)`;
    }
    
    isSearching = false;
    searchAbortController = null;
  } else {
    filteredFiles = aiFiltered;
    searchResults = [];
    document.getElementById("search-stats").style.display = "none";
  }
  
  listPage = 0;
  renderFileList();
}

function setFilter(key) {
  currentFilter = key;
  document.querySelectorAll(".ftab").forEach(el => el.classList.toggle("active", el.dataset.ai === key));
  applyFilter();
}

document.getElementById("search-input").addEventListener("input", e => {
  currentSearch = e.target.value;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => applyFilter(), 300);
});

document.querySelectorAll('input[name="searchMode"]').forEach(radio => {
  radio.addEventListener("change", () => applyFilter());
});

function renderFileList() {
  const wrap = document.getElementById("file-list");
  const pageTotal = Math.ceil(filteredFiles.length / LIST_PAGE_SIZE) || 1;
  const start = listPage * LIST_PAGE_SIZE;
  const slice = filteredFiles.slice(start, start + LIST_PAGE_SIZE);
  const q = currentSearch.trim();
  const mode = document.querySelector('input[name="searchMode"]:checked')?.value || 'title';

  if (isSearching) {
    wrap.innerHTML = `<div class="sidebar-empty">読み込み中...</div>`;
  } else if (filteredFiles.length === 0) {
    wrap.innerHTML = `<div class="sidebar-empty">${q ? '一致するファイルなし' : 'ファイルがない'}</div>`;
  } else {
    wrap.innerHTML = slice.map(f => {
      const ai = aiInfo(f.ai_type);
      const date = f.created_at ? f.created_at.slice(0,10) : "";
      
      let snippetsHtml = "";
      if (mode === 'content' && q && f.snippets && f.snippets.length > 0) {
        const displaySnippets = f.snippets.slice(0, 3);
        snippetsHtml = `<div class="search-snippets">` +
          displaySnippets.map(s => `<div class="search-snippet">...${s.highlighted}...<span class="snippet-page">p.${s.page}</span></div>`).join('') +
          (f.snippets.length > 3 ? `<div class="search-more">他 ${f.snippets.length - 3} 件の一致</div>` : '') +
          `</div>`;
      }
      
      return `<div class="file-item${f.id === activeFileId ? ' active' : ''}" onclick="openFile(${f.id})">
        <div class="file-item-top">
          <span class="ai-badge ${ai.cssClass}">${ai.label}</span>
          <span class="file-name">${mode === 'title' && q ? highlightText(f.title, q) : escHtml(f.title)}</span>
        </div>
        <div class="file-date">${date}</div>
        ${snippetsHtml}
      </div>`;
    }).join("");
  }

  const pg = document.getElementById("list-pagination");
  if (pageTotal <= 1) { pg.innerHTML = ""; return; }
  pg.innerHTML = `
    <button class="list-page-btn" onclick="listPageMove(-1)" ${listPage===0?"disabled":""}>←</button>
    <span class="list-page-info">${listPage+1} / ${pageTotal}</span>
    <button class="list-page-btn" onclick="listPageMove(1)"  ${listPage>=pageTotal-1?"disabled":""}>→</button>`;
}

function listPageMove(d) {
  const pageTotal = Math.ceil(filteredFiles.length / LIST_PAGE_SIZE) || 1;
  listPage = Math.max(0, Math.min(pageTotal - 1, listPage + d));
  renderFileList();
}

// ファイルを開く
let pages = [];
let currentPage = 0;
let currentFileTitle = "";

async function openFile(id) {
  activeFileId = id;
  renderFileList();
  closeMenu();
  try {
    let row = contentCache.has(id) ? { id, content: contentCache.get(id) } : null;
    if (!row) {
      row = await sbGetOne(id);
      if (row) contentCache.set(id, row.content);
    }
    if (!row) { showToast("データなし", "error"); return; }
    
    const fileInfo = allFiles.find(f => f.id === id);
    currentFileTitle = fileInfo?.title || row.title || "";
    document.getElementById("topbar-title").textContent = currentFileTitle;
    
    pages = parsePages(row.content);
    currentPage = 0;

    // 検索中なら該当ファイルのスニペットをヒットパネルに表示
    const q = currentSearch.trim();
    const mode = document.querySelector('input[name="searchMode"]:checked')?.value || 'title';
    if (mode === 'content' && q) {
      const content = contentCache.get(id) || row.content;
      const snippets = getSnippetAroundMatch(content, q);
      renderHitPanel(snippets);
    } else {
      document.getElementById("hit-panel").style.display = "none";
    }

    renderPage();
  } catch(e) {
    showToast("読み込み失敗: " + e.message, "error");
  }
}

function parsePages(content) {
  if (!content) return [];
  const lines = content.split("\n");
  const watashiPattern = /^私[：:]\s*/;
  const aiSpeakerPattern = new RegExp(`^(${AI_SPEAKER_LABELS.join("|")})[：:]\\s*`);

  const blocks = [];
  let cur = null;
  for (let i = 0; i < lines.length; i++) {
    if (watashiPattern.test(lines[i])) {
      if (cur !== null) blocks.push(cur);
      cur = { startLine: i, lines: [lines[i]] };
    } else if (cur !== null) {
      cur.lines.push(lines[i]);
    }
  }
  if (cur !== null) blocks.push(cur);
  if (blocks.length === 0) return [{ userText: content, turns: [] }];

  return blocks.map(block => {
    const bLines = block.lines;
    const firstLine = bLines[0].replace(watashiPattern, "");
    const turns = [];
    let userParts = firstLine ? [firstLine] : [];
    let currentSpeaker = null;
    let currentTurnLines = [];

    for (let i = 1; i < bLines.length; i++) {
      const m = bLines[i].match(aiSpeakerPattern);
      if (m) {
        if (currentSpeaker !== null) {
          turns.push({ speaker: currentSpeaker, text: currentTurnLines.join("\n").trim() });
        } else {
          const extra = userParts.concat(currentTurnLines).join("\n").trim();
          userParts = extra ? [extra] : [];
        }
        currentSpeaker = m[1];
        const remainder = bLines[i].replace(aiSpeakerPattern, "").trim();
        currentTurnLines = remainder ? [remainder] : [];
      } else {
        if (currentSpeaker !== null) {
          currentTurnLines.push(bLines[i]);
        } else {
          userParts.push(bLines[i]);
        }
      }
    }
    if (currentSpeaker !== null) {
      turns.push({ speaker: currentSpeaker, text: currentTurnLines.join("\n").trim() });
    } else if (currentTurnLines.length > 0) {
      userParts = userParts.concat(currentTurnLines);
    }
    return { userText: userParts.join("\n").trim(), turns };
  });
}

function renderPage() {
  const nav = document.getElementById("page-nav");
  const q = currentSearch.trim();
  const mode = document.querySelector('input[name="searchMode"]:checked')?.value || 'title';
  
  if (pages.length === 0) {
    nav.classList.remove("show");
    document.getElementById("viewer").innerHTML = `<div class="placeholder"><div class="placeholder-icon">📄</div><div class="placeholder-text">内容がない</div></div>`;
    return;
  }

  nav.classList.add("show");
  const p = pages[currentPage];

  document.getElementById("page-info").textContent = `${currentPage + 1} / ${pages.length}`;
  document.getElementById("page-title-nav").textContent = currentFileTitle;
  document.getElementById("btn-first").disabled = currentPage === 0;
  document.getElementById("btn-prev").disabled  = currentPage === 0;
  document.getElementById("btn-next").disabled  = currentPage === pages.length - 1;
  document.getElementById("btn-last").disabled  = currentPage === pages.length - 1;

  let html = "";
  if (p.userText) {
    const displayText = (mode === 'content' && q) ? highlightText(p.userText, q) : escHtml(p.userText);
    html += `<div class="msg-block"><div class="msg-user"><div class="msg-user-label">私</div><div class="msg-text">${displayText}</div></div></div>`;
  }
  for (const turn of p.turns) {
    const ai = AI_RULES.find(r => r.label === turn.speaker) || { cssClass: "ai-other", label: turn.speaker };
    const displayText = (mode === 'content' && q) ? highlightText(turn.text, q) : escHtml(turn.text);
    html += `<div class="msg-block"><div class="msg-ai"><div class="msg-ai-label ${ai.cssClass}">${escHtml(turn.speaker)}</div><div class="msg-text">${displayText}</div></div></div>`;
  }
  if (!p.userText && p.turns.length === 0) {
    html = `<div class="viewer"><div class="msg-text">${escHtml("")}</div></div>`;
  }
  document.getElementById("viewer").innerHTML = `<div class="viewer">${html}</div>`;
  document.getElementById("viewer-wrap").scrollTop = 0;
}

function changePage(dir) {
  if (pages.length === 0) return;
  if (dir === "first") currentPage = 0;
  else if (dir === "last") currentPage = pages.length - 1;
  else currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
  renderPage();
}

// ZIP読み込み
document.getElementById("zipInput").addEventListener("change", async e => {
  const files = Array.from(e.target.files);
  e.target.value = "";
  if (!files.length) return;
  
  let allEntries = [];
  for (const file of files) {
    try {
      const zip = await JSZip.loadAsync(file);
      zip.forEach((path, entry) => {
        if (!entry.dir && /\.(txt|md|log)$/i.test(path)) allEntries.push({ path, entry });
      });
    } catch(err) {
      showToast(`ZIP読み込み失敗: ${file.name}`, "error");
    }
  }
  if (!allEntries.length) { showToast("対象ファイルなし", "error"); return; }

  let done = 0, failed = 0;
  showProgress(0, allEntries.length);
  titleCache = null;
  contentCache.clear();
  contentCacheInitialized = false;
  await ensureTitleCache();

  for (let i = 0; i < allEntries.length; i += BATCH_SIZE) {
    const batch = allEntries.slice(i, i + BATCH_SIZE);
    await Promise.all(batch.map(async ({ path, entry }) => {
      const text = await entry.async("string");
      const name = path.split("/").pop();
      const title = name.replace(/\.(txt|md|log)$/i, "");
      const ai = detectAI(name);
      const ok = await sbUpsertSafe(title, text, ai.key);
      if (!ok) failed++;
      done++;
      showProgress(done, allEntries.length);
    }));
  }

  hideProgress();
  showToast(failed ? `完了（失敗${failed}件）` : `${done}件保存完了`, failed ? "error" : "success");
  await loadList();
});

// 全削除
async function clearAll() {
  if (!confirm("全データを削除しますか？")) return;
  try {
    await sbDeleteAll();
    allFiles = []; filteredFiles = []; searchResults = [];
    titleCache = null; contentCache.clear();
    contentCacheInitialized = false;
    activeFileId = null; pages = []; currentPage = 0;
    renderFileList();
    document.getElementById("search-stats").style.display = "none";
    document.getElementById("page-nav").classList.remove("show");
    document.getElementById("viewer").innerHTML = `<div class="placeholder"><div class="placeholder-icon">📂</div><div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div></div>`;
    document.getElementById("topbar-title").textContent = "AI会話ログ";
    showToast("全削除完了", "success");
  } catch(e) {
    showToast("削除失敗: " + e.message, "error");
  }
}

function escHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
