<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIログ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  background:#0f0f10;
  color:#eee;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ロック */
#lock {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:999;
}

input, button {
  padding:10px;
  font-size:16px;
}

/* topbar */
.topbar {
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1c1c1e;
  padding:0 10px;
}

/* sidebar */
.sidebar {
  position:fixed;
  top:55px;
  left:-280px;
  width:280px;
  height:calc(100% - 55px);
  background:#1c1c1e;
  overflow:auto;
  transition:0.3s;
  z-index:10;
}
.sidebar.open { left:0; }

.file-item {
  padding:14px;
  border-bottom:1px solid #333;
  cursor:pointer;
  font-size:14px;
}

/* viewer */
.viewer {
  height:calc(100vh - 55px);
  padding:15px;
  overflow:auto;
  white-space:pre-wrap;
}

/* mobile対策 */
@media (max-width:768px){
  .sidebar { width:85%; left:-100%; }
}
</style>
</head>

<body>

<!-- ロック -->
<div id="lock">
  <input id="pw" type="password" placeholder="パスワード">
  <button id="loginBtn">入る</button>
</div>

<!-- topbar -->
<div class="topbar">
  <div onclick="toggleMenu()">☰</div>
  <div>AIログ</div>
  <div>
    <input type="file" id="txtInput" hidden>
    <button onclick="txtInput.click()">TXT</button>

    <input type="file" id="zipInput" hidden>
    <button onclick="zipInput.click()">ZIP</button>
  </div>
</div>

<div id="sidebar" class="sidebar"></div>
<div id="viewer" class="viewer"></div>

<script>
/* =====================
   Supabase設定
===================== */
const SUPABASE_URL = "ここにURL";
const SUPABASE_KEY = "ここにKEY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =====================
   パスワード
===================== */
const PASSWORD = "ai-shinan";

const lock = document.getElementById("lock");
const sidebar = document.getElementById("sidebar");
const viewer = document.getElementById("viewer");

/* =====================
   ログイン
===================== */
document.getElementById("loginBtn").addEventListener("click", () => {
  const pw = document.getElementById("pw").value;

  if (pw === PASSWORD) {
    lock.style.display = "none";
    loadList();
  } else {
    alert("違う");
  }
});

/* =====================
   メニュー
===================== */
function toggleMenu() {
  sidebar.classList.toggle("open");
}

/* =====================
   TXT保存（Supabase）
===================== */
txtInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  await sb.storage.from("logs").upload(Date.now()+"_"+file.name, file);
  loadList();
});

/* =====================
   ZIP対応（復活版）
===================== */
zipInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const zip = await JSZip.loadAsync(file);

  for (const name in zip.files) {
    const entry = zip.files[name];
    if (entry.dir) continue;

    if (entry.name.endsWith(".txt")) {
      const blob = await entry.async("blob");
      await sb.storage.from("logs").upload(Date.now()+"_"+entry.name, blob);
    }
  }

  loadList();
});

/* =====================
   一覧表示
===================== */
async function loadList() {
  sidebar.innerHTML = "";

  const { data } = await sb.storage.from("logs").list();

  data.forEach(file => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.textContent = file.name;

    div.onclick = async () => {
      const { data } = sb.storage.from("logs").getPublicUrl(file.name);
      const res = await fetch(data.publicUrl);
      viewer.textContent = await res.text();
      toggleMenu();
    };

    sidebar.appendChild(div);
  });
}
</script>

</body>
</html>
