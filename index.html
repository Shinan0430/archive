<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI会話ログ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0b; --surface: #111113; --surface2: #18181b;
  --border: #2a2a2e; --accent: #7c6af7; --accent2: #a78bfa;
  --text: #e4e4e7; --muted: #71717a;
  --success: #34d399; --error: #f87171; --topbar: 52px;
  --chatgpt: #10a37f; --grok: #1d9bf0; --deepseek: #4f8ef7;
  --claude: #c96442; --dola: #e040fb;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

#pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; transition: opacity 0.3s; }
#pw-screen.hidden { opacity: 0; pointer-events: none; }
.pw-logo { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; }
.pw-title { font-size: 22px; font-weight: 300; letter-spacing: 1px; }
.pw-box { display: flex; flex-direction: column; gap: 12px; width: min(320px, 88vw); }
.pw-input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: 'JetBrains Mono', monospace; letter-spacing: 3px; outline: none; transition: border-color 0.2s; }
.pw-input:focus { border-color: var(--accent); }
.pw-input.error { border-color: var(--error); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.pw-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
.pw-btn:active { opacity: 0.8; }
.pw-err { font-size: 12px; color: var(--error); text-align: center; height: 16px; }

.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; gap: 8px; z-index: 100; }
.menu-btn { width: 36px; height: 36px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; border-radius: 6px; }
.menu-btn span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
.menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.menu-btn.open span:nth-child(2) { opacity: 0; }
.menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.topbar-title { flex: 1; font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.topbar-actions { display: flex; gap: 5px; flex-shrink: 0; }
.btn { padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; white-space: nowrap; }
.btn:active { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: default; }

#progress-bar-wrap { position: fixed; top: var(--topbar); left: 0; right: 0; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 14px; z-index: 99; display: none; flex-direction: column; gap: 6px; }
#progress-bar-wrap.show { display: flex; }
.progress-label { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s; width: 0%; }

.sidebar-overlay { position: fixed; inset: 0; top: var(--topbar); background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.sidebar-overlay.open { opacity: 1; pointer-events: all; }
.sidebar { position: fixed; top: var(--topbar); left: 0; width: min(290px, 85vw); height: calc(100% - var(--topbar)); background: var(--surface); border-right: 1px solid var(--border); overflow: hidden; z-index: 95; transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
.sidebar.open { transform: translateX(0); }

.search-box { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; }
.search-input:focus { border-color: var(--accent); }

.filter-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab { padding: 8px 10px; font-size: 11px; cursor: pointer; color: var(--muted); white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; flex-shrink: 0; }
.ftab.active { color: var(--text); border-bottom-color: var(--accent); }
.ftab .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

.file-list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }
.sidebar-empty { padding: 24px 16px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.8; }
.list-pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.list-page-btn { width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.list-page-btn:active { background: var(--border); }
.list-page-btn:disabled { opacity: 0.3; cursor: default; }
.list-page-info { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; min-width: 60px; text-align: center; }

.file-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: background 0.15s; }
.file-item:active, .file-item.active { background: var(--surface2); }
.file-item-top { display: flex; align-items: center; gap: 6px; }
.ai-badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; font-weight: 500; }
.file-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-item.active .file-name { color: var(--accent2); }
.file-date { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

.ai-chatgpt  { background: rgba(16,163,127,0.15); color: var(--chatgpt); }
.ai-grok     { background: rgba(29,155,240,0.15); color: var(--grok); }
.ai-deepseek { background: rgba(79,142,247,0.15); color: var(--deepseek); }
.ai-claude   { background: rgba(201,100,66,0.15); color: var(--claude); }
.ai-dola     { background: rgba(224,64,251,0.15); color: var(--dola); }
.ai-other    { background: rgba(113,113,122,0.15); color: var(--muted); }

.main { position: fixed; top: var(--topbar); left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; transition: top 0.2s; }
.main.with-progress { top: calc(var(--topbar) + 52px); }

.page-nav { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); display: none; align-items: center; justify-content: space-between; padding: 8px 14px; gap: 10px; }
.page-nav.show { display: flex; }
.nav-btn { width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-btn:active { background: var(--border); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.page-info { font-size: 12px; color: var(--muted); text-align: center; flex: 1; font-family: 'JetBrains Mono', monospace; }
.page-title { font-size: 11px; color: var(--muted); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.viewer-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.viewer { padding: 16px 14px 40px; font-size: 13px; line-height: 1.9; color: var(--text); }

.placeholder { height: 100%; min-height: calc(100vh - var(--topbar)); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); padding: 40px 20px; text-align: center; }
.placeholder-icon { font-size: 36px; opacity: 0.4; }
.placeholder-text { font-size: 14px; line-height: 1.7; }

.msg-block { margin-bottom: 18px; }
.msg-user { background: var(--surface2); border-radius: 10px; padding: 12px 14px; }
.msg-user-label { font-size: 10px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; letter-spacing: 1px; }
.msg-ai { padding: 12px 0; border-bottom: 1px solid var(--border); }
.msg-ai-label { font-size: 10px; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
.msg-text { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.85; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; transition: transform 0.3s, opacity 0.3s; opacity: 0; white-space: nowrap; max-width: 88vw; overflow: hidden; text-overflow: ellipsis; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.success { border-color: var(--success); color: var(--success); }
#toast.error { border-color: var(--error); color: var(--error); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-logo">AI LOG VIEWER</div>
  <div class="pw-title">パスワードを入力</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="password" autocomplete="off">
    <div class="pw-err" id="pw-err"></div>
    <button class="pw-btn" onclick="checkPassword()">ロック解除</button>
  </div>
</div>

<div class="topbar">
  <div class="menu-btn" id="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  <div class="topbar-title" id="topbar-title">AI会話ログ</div>
  <div class="topbar-actions">
    <input type="file" id="zipInput" accept=".zip" multiple hidden>
    <button class="btn primary" id="zip-btn" onclick="document.getElementById('zipInput').click()">ZIP</button>
    <button class="btn" onclick="clearAll()">全削除</button>
  </div>
</div>

<div id="progress-bar-wrap">
  <div class="progress-label" id="progress-label">処理中…</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <div class="search-box">
    <input class="search-input" id="search-input" placeholder="🔍 タイトルを検索…">
  </div>
  <div class="filter-tabs">
    <div class="ftab active" data-ai="all"      onclick="setFilter('all')">すべて</div>
    <div class="ftab" data-ai="chatgpt"  onclick="setFilter('chatgpt')"><span class="dot" style="background:var(--chatgpt)"></span>ChatGPT</div>
    <div class="ftab" data-ai="grok"     onclick="setFilter('grok')"><span class="dot" style="background:var(--grok)"></span>Grok</div>
    <div class="ftab" data-ai="deepseek" onclick="setFilter('deepseek')"><span class="dot" style="background:var(--deepseek)"></span>DeepSeek</div>
    <div class="ftab" data-ai="claude"   onclick="setFilter('claude')"><span class="dot" style="background:var(--claude)"></span>Claude</div>
    <div class="ftab" data-ai="dola"     onclick="setFilter('dola')"><span class="dot" style="background:var(--dola)"></span>Dola</div>
  </div>
  <div class="file-list-wrap" id="file-list-wrap">
    <div id="file-list" style="flex:1"></div>
    <div class="list-pagination" id="list-pagination"></div>
  </div>
</div>

<div class="main" id="main">
  <div class="page-nav" id="page-nav">
    <button class="nav-btn" id="btn-first" onclick="changePage('first')" title="最初">⏮</button>
    <button class="nav-btn" id="btn-prev" onclick="changePage(-1)" title="前へ">←</button>
    <div style="flex:1;text-align:center">
      <div class="page-info" id="page-info"></div>
      <div class="page-title" id="page-title-nav"></div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="changePage(1)" title="次へ">→</button>
    <button class="nav-btn" id="btn-last" onclick="changePage('last')" title="最後">⏭</button>
  </div>
  <div class="viewer-wrap" id="viewer-wrap">
    <div id="viewer">
      <div class="placeholder">
        <div class="placeholder-icon">📂</div>
        <div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PASS         = "ai-shinan";
const SUPABASE_URL = "https://mtprohzzgfdohlxvfpwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_9jqBvmC7d8VxewxbzAHeYA_SoTmobit";
const TABLE        = "logs";
const BATCH_SIZE   = 5;
const RETRY_MAX    = 3;
const RETRY_DELAY  = 600;
const PAGE_SIZE    = 1000;

// AI 判定ルール（Grok 拡張版: X数字-Grok / Grok- / 先頭Grok など完全対応）
const AI_RULES = [
  { key: "chatgpt",  patterns: [/^CG-/i, /chatgpt/i],                         label: "ChatGPT",  cssClass: "ai-chatgpt" },
  { key: "grok",     patterns: [/^(?:X\d+-)?Grok[-_ ]/i, /^Grok[-_ ]/i, /Grok/i], label: "Grok",  cssClass: "ai-grok" },
  { key: "deepseek", patterns: [/^DS-/i, /deepseek/i],                         label: "DeepSeek", cssClass: "ai-deepseek" },
  { key: "claude",   patterns: [/^C-/i, /claude/i],                            label: "Claude",   cssClass: "ai-claude" },
  { key: "dola",     patterns: [/^Dola-/i, /dola/i],                           label: "Dola",     cssClass: "ai-dola" },
];

function detectAI(title) {
  if (!title) return { key: "other", label: "Other", cssClass: "ai-other" };
  let base = title.replace(/\.(txt|md|log)$/i, "");
  for (const r of AI_RULES) {
    for (const pattern of r.patterns) {
      if (pattern.test(base)) return r;
    }
  }
  if (/grok/i.test(base)) return { key: "grok", label: "Grok", cssClass: "ai-grok" };
  return { key: "other", label: "Other", cssClass: "ai-other" };
}

function aiInfo(key) {
  return AI_RULES.find(r => r.key === key) || { key: "other", label: "Other", cssClass: "ai-other" };
}

function extractSortKey(title) {
  const matches = title.match(/(\d+)/g);
  if (!matches) return 0;
  const lastNum = parseInt(matches[matches.length - 1], 10);
  const firstNum = matches.length > 1 ? parseInt(matches[0], 10) : 0;
  return firstNum * 10000 + lastNum;
}

// Supabase
const SB_H = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...opts, headers: { ...SB_H, ...(opts.headers || {}) } });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  return ct.includes("json") ? res.json() : null;
}
async function sbGetAll() {
  let allRows = [], offset = 0;
  while (true) {
    const rows = await sbFetch(`${TABLE}?select=id,title,ai_type,created_at&limit=1000&offset=${offset}`) || [];
    allRows = allRows.concat(rows);
    if (rows.length < 1000) break;
    offset += 1000;
  }
  allRows.sort((a, b) => extractSortKey(a.title) - extractSortKey(b.title));
  return allRows;
}
async function sbGetOne(id) {
  const rows = await sbFetch(`${TABLE}?id=eq.${id}&select=title,content,ai_type`) || [];
  return rows[0] || null;
}
const sbDeleteAll = () => sbFetch(`${TABLE}?id=gt.0`, { method: "DELETE", headers: { "Prefer": "return=minimal" } });
let titleCache = null;
async function ensureTitleCache() {
  if (titleCache !== null) return;
  let all = [], offset = 0;
  while (true) {
    const rows = await sbFetch(`${TABLE}?select=id,title&limit=1000&offset=${offset}`) || [];
    all = all.concat(rows);
    if (rows.length < 1000) break;
    offset += 1000;
  }
  titleCache = {};
  for (const r of all) titleCache[r.title] = r.id;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
async function sbUpsertSafe(title, content, ai_type) {
  for (let attempt = 0; attempt <= RETRY_MAX; attempt++) {
    try {
      await ensureTitleCache();
      const existingId = titleCache[title];
      if (existingId) {
        await sbFetch(`${TABLE}?id=eq.${existingId}`, { method: "PATCH", headers: { "Prefer": "return=minimal" }, body: JSON.stringify({ content, ai_type, created_at: new Date().toISOString() }) });
      } else {
        const result = await sbFetch(TABLE, { method: "POST", headers: { "Prefer": "return=representation" }, body: JSON.stringify({ title, content, ai_type }) });
        if (result?.[0]?.id) titleCache[title] = result[0].id;
      }
      return true;
    } catch (err) {
      if (attempt < RETRY_MAX) await sleep(RETRY_DELAY * (attempt + 1));
      else { console.error(`保存失敗: ${title}`, err.message); return false; }
    }
  }
  return false;
}

// パスワード
document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });
function checkPassword() {
  const inp = document.getElementById("pw-input");
  const err = document.getElementById("pw-err");
  if (inp.value === PASS) {
    const s = document.getElementById("pw-screen");
    s.classList.add("hidden");
    setTimeout(() => s.style.display = "none", 300);
    loadList();
  } else {
    err.textContent = "パスワードが違う";
    inp.classList.add("error"); inp.value = "";
    setTimeout(() => { inp.classList.remove("error"); err.textContent = ""; }, 1500);
  }
}

// UI 状態
let menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById("sidebar").classList.toggle("open", menuOpen);
  document.getElementById("overlay").classList.toggle("open", menuOpen);
  document.getElementById("menu-btn").classList.toggle("open", menuOpen);
}
function closeMenu() {
  menuOpen = false;
  ["sidebar","overlay","menu-btn"].forEach(id => document.getElementById(id).classList.remove("open"));
}
let toastTimer;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 3000);
}
function showProgress(cur, total) {
  document.getElementById("progress-bar-wrap").classList.add("show");
  document.getElementById("main").classList.add("with-progress");
  document.getElementById("progress-fill").style.width = total > 0 ? `${Math.round(cur/total*100)}%` : "0%";
  document.getElementById("progress-label").textContent = `保存中… ${cur} / ${total}`;
}
function hideProgress() {
  document.getElementById("progress-bar-wrap").classList.remove("show");
  document.getElementById("main").classList.remove("with-progress");
}

// ファイルリスト + ページ送り (Viewer内ページング)
let allFiles = [];
let currentFileIndex = -1;
let currentPage = 0;
let pages = []; // 各ページは { aiType, content, rawTitle }

// 会話をAI名で分割し、ページを生成する
function parseConversation(content, rawTitle) {
  const aiType = detectAI(rawTitle).key;
  const lines = content.split('\n');
  const pages = [];
  let currentPage = { aiType, blocks: [], rawTitle };
  let currentBlock = null; // { type: 'user' or 'ai', label: string, text: string }
  
  // AI名の正規表現（ラベル用）
  const aiPatterns = [
    { pattern: /^ChatGPT[：:]/i, label: 'ChatGPT' },
    { pattern: /^Grok[：:]/i, label: 'Grok' },
    { pattern: /^Claude[：:]/i, label: 'Claude' },
    { pattern: /^DeepSeek[：:]/i, label: 'DeepSeek' },
    { pattern: /^Dola[：:]/i, label: 'Dola' },
    { pattern: /^私[：:]/i, label: '私' }
  ];

  for (let line of lines) {
    // 空行はスキップ（ただしブロック内の改行は保持したいので工夫）
    let matched = false;
    for (let { pattern, label } of aiPatterns) {
      const match = line.match(pattern);
      if (match) {
        // 新しいブロック開始
        const text = line.substring(match[0].length).trim();
        if (label === '私') {
          // ユーザーブロック
          if (currentBlock) {
            currentPage.blocks.push(currentBlock);
          }
          // 新しいページを開始（私：で区切る）
          if (currentPage.blocks.length > 0) {
            pages.push(currentPage);
            currentPage = { aiType, blocks: [], rawTitle };
          }
          currentBlock = { type: 'user', label: '私', text };
        } else {
          // AIブロック
          if (currentBlock) {
            currentPage.blocks.push(currentBlock);
          }
          currentBlock = { type: 'ai', label, text };
        }
        matched = true;
        break;
      }
    }
    if (!matched && currentBlock) {
      // 継続行
      currentBlock.text += '\n' + line;
    } else if (!matched && !currentBlock) {
      // 最初のラベルが出る前のテキスト（無視 or 最初のページに入れる）
      if (currentPage.blocks.length === 0) {
        currentBlock = { type: 'ai', label: aiInfo(aiType).label, text: line };
      }
    }
  }
  if (currentBlock) {
    currentPage.blocks.push(currentBlock);
  }
  if (currentPage.blocks.length > 0) {
    pages.push(currentPage);
  }
  
  // 空のページを除去
  return pages.filter(p => p.blocks.length > 0);
}

// 現在選択中のファイルのページを表示
async function loadFileByIndex(index) {
  if (index < 0 || index >= allFiles.length) return;
  const file = allFiles[index];
  currentFileIndex = index;
  document.getElementById("topbar-title").textContent = file.title;
  
  // ハイライト更新
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.querySelector(`.file-item[data-id="${file.id}"]`);
  if (activeEl) activeEl.classList.add('active');
  
  // コンテンツ取得
  showToast("読み込み中…");
  try {
    const data = await sbGetOne(file.id);
    if (!data) throw new Error("データなし");
    
    pages = parseConversation(data.content, data.title);
    currentPage = 0;
    renderPage();
    updateNavButtons();
    document.getElementById("page-nav").classList.add("show");
  } catch (e) {
    showToast("読み込みエラー", "error");
    console.error(e);
  }
  closeMenu();
}

function renderPage() {
  const viewer = document.getElementById("viewer");
  if (pages.length === 0) {
    viewer.innerHTML = `<div class="placeholder"><div class="placeholder-icon">📄</div><div class="placeholder-text">会話がありません</div></div>`;
    return;
  }
  const page = pages[currentPage];
  let html = '';
  for (const block of page.blocks) {
    if (block.type === 'user') {
      html += `<div class="msg-block"><div class="msg-user"><div class="msg-user-label">👤 ${block.label}</div><div class="msg-text">${escapeHtml(block.text)}</div></div></div>`;
    } else {
      const aiClass = `ai-${page.aiType}`;
      html += `<div class="msg-block"><div class="msg-ai"><div class="msg-ai-label ${aiClass}" style="display:inline-block; padding:2px 8px; border-radius:4px;">🤖 ${block.label}</div><div class="msg-text">${escapeHtml(block.text)}</div></div></div>`;
    }
  }
  viewer.innerHTML = html;
  viewer.scrollTop = 0;
  updateNavButtons();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}

function updateNavButtons() {
  const info = document.getElementById("page-info");
  const titleNav = document.getElementById("page-title-nav");
  const btnPrev = document.getElementById("btn-prev");
  const btnNext = document.getElementById("btn-next");
  const btnFirst = document.getElementById("btn-first");
  const btnLast = document.getElementById("btn-last");
  
  if (pages.length === 0) {
    info.textContent = `0 / 0`;
    titleNav.textContent = allFiles[currentFileIndex]?.title || '';
    btnPrev.disabled = true;
    btnNext.disabled = true;
    btnFirst.disabled = true;
    btnLast.disabled = true;
    return;
  }
  
  info.textContent = `${currentPage + 1} / ${pages.length}`;
  titleNav.textContent = allFiles[currentFileIndex]?.title || '';
  btnPrev.disabled = currentPage === 0;
  btnNext.disabled = currentPage === pages.length - 1;
  btnFirst.disabled = currentPage === 0;
  btnLast.disabled = currentPage === pages.length - 1;
}

function changePage(delta) {
  if (pages.length === 0) return;
  let newPage = currentPage;
  if (delta === 'first') newPage = 0;
  else if (delta === 'last') newPage = pages.length - 1;
  else newPage = currentPage + delta;
  
  if (newPage >= 0 && newPage < pages.length) {
    currentPage = newPage;
    renderPage();
  }
}

// ファイルリスト表示
let filteredFiles = [];
let listPage = 0;
const LIST_PAGE_SIZE = 50;
let currentFilter = 'all';
let searchQuery = '';

function filterAndSearch() {
  const q = searchQuery.toLowerCase();
  filteredFiles = allFiles.filter(f => {
    if (currentFilter !== 'all' && f.ai_type !== currentFilter) return false;
    if (q && !f.title.toLowerCase().includes(q)) return false;
    return true;
  });
  listPage = 0;
  renderFileList();
}

function setFilter(ai) {
  currentFilter = ai;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.ftab[data-ai="${ai}"]`).classList.add('active');
  filterAndSearch();
}

function renderFileList() {
  const container = document.getElementById("file-list");
  const pagination = document.getElementById("list-pagination");
  const totalPages = Math.ceil(filteredFiles.length / LIST_PAGE_SIZE);
  const start = listPage * LIST_PAGE_SIZE;
  const end = Math.min(start + LIST_PAGE_SIZE, filteredFiles.length);
  const pageFiles = filteredFiles.slice(start, end);
  
  if (filteredFiles.length === 0) {
    container.innerHTML = `<div class="sidebar-empty">ファイルがありません</div>`;
    pagination.innerHTML = '';
    return;
  }
  
  let html = '';
  for (const f of pageFiles) {
    const ai = aiInfo(f.ai_type);
    const date = f.created_at ? new Date(f.created_at).toLocaleDateString('ja-JP') : '';
    const activeClass = (currentFileIndex !== -1 && allFiles[currentFileIndex]?.id === f.id) ? 'active' : '';
    html += `<div class="file-item ${activeClass}" data-id="${f.id}" onclick="loadFileById(${f.id})">
      <div class="file-item-top"><span class="ai-badge ${ai.cssClass}">${ai.label}</span><span class="file-name">${escapeHtml(f.title)}</span></div>
      <div class="file-date">${date}</div>
    </div>`;
  }
  container.innerHTML = html;
  
  // ページネーション
  let pagHtml = '';
  pagHtml += `<button class="list-page-btn" onclick="changeListPage(-1)" ${listPage === 0 ? 'disabled' : ''}>←</button>`;
  pagHtml += `<span class="list-page-info">${listPage+1} / ${totalPages}</span>`;
  pagHtml += `<button class="list-page-btn" onclick="changeListPage(1)" ${listPage >= totalPages-1 ? 'disabled' : ''}>→</button>`;
  pagination.innerHTML = pagHtml;
}

function changeListPage(delta) {
  const totalPages = Math.ceil(filteredFiles.length / LIST_PAGE_SIZE);
  const newPage = listPage + delta;
  if (newPage >= 0 && newPage < totalPages) {
    listPage = newPage;
    renderFileList();
  }
}

async function loadFileById(id) {
  const index = allFiles.findIndex(f => f.id === id);
  if (index !== -1) await loadFileByIndex(index);
}

async function loadList() {
  showToast("リスト取得中…");
  try {
    allFiles = await sbGetAll();
    // ai_type 補完
    allFiles.forEach(f => { if (!f.ai_type) f.ai_type = detectAI(f.title).key; });
    filterAndSearch();
    if (allFiles.length > 0) {
      await loadFileByIndex(0);
    }
  } catch (e) {
    showToast("リスト取得エラー", "error");
  }
}

// ZIP処理
document.getElementById('zipInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;
  
  showProgress(0, 1);
  const zip = new JSZip();
  let totalFiles = 0;
  const entries = [];
  
  for (const file of files) {
    try {
      const content = await file.arrayBuffer();
      const z = await zip.loadAsync(content);
      const txtFiles = Object.keys(z.files).filter(name => name.endsWith('.txt') && !z.files[name].dir);
      for (const name of txtFiles) {
        const text = await z.files[name].async("string");
        entries.push({ title: name, content: text });
      }
    } catch (err) {
      showToast(`ZIPエラー: ${file.name}`, "error");
    }
  }
  
  totalFiles = entries.length;
  if (totalFiles === 0) {
    hideProgress();
    showToast("テキストファイルが見つかりません", "error");
    e.target.value = '';
    return;
  }
  
  showProgress(0, totalFiles);
  let success = 0;
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const ai = detectAI(e.title);
    const ok = await sbUpsertSafe(e.title, e.content, ai.key);
    if (ok) success++;
    showProgress(i + 1, totalFiles);
  }
  
  hideProgress();
  showToast(`${success} / ${totalFiles} 件保存`, success === totalFiles ? "success" : "error");
  e.target.value = '';
  await loadList();
});

async function clearAll() {
  if (!confirm('すべての会話ログを削除しますか？')) return;
  showToast("削除中…");
  try {
    await sbDeleteAll();
    titleCache = null;
    allFiles = [];
    filteredFiles = [];
    pages = [];
    currentFileIndex = -1;
    currentPage = 0;
    document.getElementById("viewer").innerHTML = `<div class="placeholder"><div class="placeholder-icon">📂</div><div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div></div>`;
    document.getElementById("page-nav").classList.remove("show");
    document.getElementById("topbar-title").textContent = "AI会話ログ";
    renderFileList();
    showToast("削除完了", "success");
  } catch (e) {
    showToast("削除エラー", "error");
  }
}

// 検索
document.getElementById("search-input").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  filterAndSearch();
});

window.onload = () => {
  // パスワード画面表示
};
