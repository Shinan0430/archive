let allRows = [];

// ── 一覧読み込み（無限スクロール対応） ──
async function loadList(reset = true) {
  if (reset) {
    allRows = [];
    currentOffset = 0;
    hasMore = true;
    document.getElementById("file-list").innerHTML = '<div class="sidebar-empty">読み込み中…</div>';
  }
  if (isLoading || !hasMore) return;
  
  isLoading = true;
  try {
    const newRows = await sbGetLogs(LIST_PAGE_SIZE, currentOffset);
    if (newRows.length < LIST_PAGE_SIZE) hasMore = false;
    
    allRows = [...allRows, ...newRows];
    currentOffset += newRows.length;
    
    renderList();
  } catch (err) {
    console.error(err);
  } finally {
    isLoading = false;
  }
}

function setFilter(ai) {
  curFilter = ai;
  document.querySelectorAll(".ftab").forEach(t => t.classList.toggle("active", t.dataset.ai === ai));
  loadList(true);   // フィルタ変更時はリセット
}

let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById("search-input").value.trim();
    if (q) {
      allRows = await sbSearch(q);
      hasMore = false;
    } else {
      await loadList(true);
    }
    renderList();
  }, 350);
}

function renderList() {
  const list = document.getElementById("file-list");
  let rows = curFilter === "all" ? allRows : allRows.filter(r => r.ai_type === curFilter);

  if (rows.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">該当なし</div>';
    return;
  }

  list.innerHTML = "";
  rows.forEach(row => {
    const ai = aiInfo(row.ai_type);
    const div = document.createElement("div");
    div.className = "file-item" + (row.id === activeId ? " active" : "");
    const dateStr = row.created_at 
      ? new Date(row.created_at).toLocaleDateString("ja-JP", {month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"}) 
      : "";
    
    div.innerHTML = `
      <div class="file-item-top">
        <span class="ai-badge \( {ai.cssClass}"> \){ai.label}</span>
        <span class="file-name">${escHtml(row.title)}</span>
      </div>
      <div class="file-date">${dateStr}</div>`;
    
    div.onclick = () => {
      activeId = row.id;
      openLog(row.id, row.title, row.ai_type);
      closeMenu();
      renderList();
    };
    list.appendChild(div);
  });

  // 無限スクロール用の余白追加
  if (hasMore) {
    const loader = document.createElement("div");
    loader.className = "sidebar-empty";
    loader.style.padding = "20px";
    loader.textContent = "スクロールでさらに読み込み...";
    list.appendChild(loader);
  }
}

// 無限スクロール実装
function setupInfiniteScroll() {
  const fileListWrap = document.querySelector(".file-list-wrap");
  fileListWrap.addEventListener("scroll", () => {
    if (isLoading || !hasMore) return;
    
    const { scrollTop, scrollHeight, clientHeight } = fileListWrap;
    if (scrollTop + clientHeight >= scrollHeight - 150) {
      loadList(false);   // 追加読み込み
    }
  });
}

// ── 初期化 ──

  const inp = document.getElementById("pw-input");
  const err = document.getElementById("pw-err");

    const s = document.getElementById("pw-screen");
    s.classList.add("hidden");
    setTimeout(() => s.style.display = "none", 300);
    loadList(true);
    setupInfiniteScroll();   // ← ここを追加
  } else {
    /* エラー処理（変更なし） */
  }
}
