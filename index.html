<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<title>AIログ</title>

<style>
body { margin:0; background:#0f0f10; color:#eee; font-family:sans-serif; }

/* ロック画面 */
#lock {
  position:fixed; inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* 上バー */
.topbar {
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1c1c1e;
  padding:0 10px;
}

/* ボタン */
button {
  margin-left:5px;
  padding:6px 10px;
  background:#2a2a2a;
  color:#eee;
  border:none;
  border-radius:6px;
}

/* サイド */
.sidebar {
  position:fixed;
  top:55px;
  left:-260px;
  width:260px;
  height:calc(100% - 55px);
  background:#1c1c1e;
  overflow:auto;
  transition:0.3s;
}
.sidebar.open { left:0; }

.file-item {
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

/* ビュー */
.viewer {
  height:calc(100vh - 55px);
  padding:15px;
  overflow:auto;
  white-space:pre-wrap;
}

/* チャット */
#chat {
  padding:10px;
  background:#111;
}
textarea {
  width:100%;
  height:80px;
  background:#1c1c1e;
  color:#fff;
}
</style>
</head>

<body>

<!-- ロック -->
<div id="lock">
  <input id="pw" type="password" placeholder="パスワード">
  <button onclick="login()">入る</button>
</div>

<!-- チャット保存 -->
<div id="chat">
  <textarea id="msg" placeholder="AI会話を書く"></textarea>
  <button onclick="saveMsg()">保存</button>
</div>

<div class="topbar">
  <div onclick="toggleMenu()">☰</div>
  <div>AIログ</div>
  <div>
    <input type="file" id="txtInput" hidden>
    <button onclick="txtInput.click()">TXT</button>

    <input type="file" id="zipInput" hidden>
    <button onclick="zipInput.click()">ZIP</button>
  </div>
</div>

<div id="sidebar" class="sidebar"></div>
<div id="viewer" class="viewer"></div>

<script>
const PASSWORD = "AI-shinan";

/* Supabase */
const SUPABASE_URL = "ここにURL";
const SUPABASE_KEY = "ここにKEY";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const lock = document.getElementById("lock");
const sidebar = document.getElementById("sidebar");
const viewer = document.getElementById("viewer");

/* ログイン */
function login() {
  const pw = document.getElementById("pw").value;
  if (pw === PASSWORD) {
    lock.style.display = "none";
    loadList();
  } else {
    alert("パスワード違う");
  }
}

/* サイド */
function toggleMenu() {
  sidebar.classList.toggle("open");
}

/* AI会話保存 */
async function saveMsg() {
  const text = document.getElementById("msg").value;

  const { error } = await sb.storage.from("logs").upload(
    Date.now() + ".txt",
    new Blob([text], { type:"text/plain" })
  );

  if (error) {
    alert("エラー: " + error.message);
  } else {
    alert("保存した");
    document.getElementById("msg").value = "";
    loadList();
  }
}

/* TXT */
txtInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  await sb.storage.from("logs").upload(Date.now()+"_"+file.name, file);
  loadList();
});

/* ZIP */
zipInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const zip = await JSZip.loadAsync(file);

  for (const name in zip.files) {
    const entry = zip.files[name];
    if (entry.dir) continue;

    if (entry.name.endsWith(".txt")) {
      const blob = await entry.async("blob");

      await sb.storage.from("logs").upload(
        Date.now()+"_"+entry.name,
        blob
      );
    }
  }

  loadList();
});

/* 一覧 */
async function loadList() {
  sidebar.innerHTML = "";

  const { data, error } = await sb.storage.from("logs").list();

  if (error) {
    alert(error.message);
    return;
  }

  data.forEach(file => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.textContent = file.name;

    div.onclick = async () => {
      const { data } = sb.storage.from("logs").getPublicUrl(file.name);
      const res = await fetch(data.publicUrl);
      viewer.textContent = await res.text();
      toggleMenu();
    };

    sidebar.appendChild(div);
  });
}
</script>

</body>
</html>
