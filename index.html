<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI会話ログ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b; --surface: #111113; --surface2: #18181b;
    --border: #2a2a2e; --accent: #7c6af7; --accent2: #a78bfa;
    --text: #e4e4e7; --muted: #71717a;
    --success: #34d399; --error: #f87171; --topbar: 52px;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

  #pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; transition: opacity 0.3s; }
  #pw-screen.hidden { opacity: 0; pointer-events: none; }
  .pw-logo { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; }
  .pw-title { font-size: 22px; font-weight: 300; letter-spacing: 1px; }
  .pw-box { display: flex; flex-direction: column; gap: 12px; width: min(320px, 88vw); }
  .pw-input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: 'JetBrains Mono', monospace; letter-spacing: 3px; outline: none; transition: border-color 0.2s; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--error); animation: shake 0.3s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .pw-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: opacity 0.2s; }
  .pw-btn:active { opacity: 0.8; }
  .pw-err { font-size: 12px; color: var(--error); text-align: center; height: 16px; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 10px; z-index: 100; }
  .menu-btn { width: 36px; height: 36px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; border-radius: 6px; transition: background 0.2s; }
  .menu-btn:active { background: var(--surface2); }
  .menu-btn span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
  .menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .menu-btn.open span:nth-child(2) { opacity: 0; }
  .menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
  .topbar-title { flex: 1; font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn { padding: 7px 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .btn:active { background: var(--border); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  .sidebar-overlay { position: fixed; inset: 0; top: var(--topbar); background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }
  .sidebar { position: fixed; top: var(--topbar); left: 0; width: min(280px, 80vw); height: calc(100% - var(--topbar)); background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; z-index: 95; transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header { padding: 14px 16px 10px; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; border-bottom: 1px solid var(--border); }
  .sidebar-empty { padding: 24px 16px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.8; }
  .file-item { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 3px; transition: background 0.15s; }
  .file-item:active, .file-item.active { background: var(--surface2); }
  .file-item.active .file-name { color: var(--accent2); }
  .file-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-date { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .main { position: fixed; top: var(--topbar); left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .viewer { padding: 20px 16px 40px; white-space: pre-wrap; font-size: 13px; line-height: 1.85; color: var(--text); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
  .placeholder { height: calc(100vh - var(--topbar)); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); padding: 40px 20px; text-align: center; }
  .placeholder-icon { font-size: 36px; opacity: 0.4; }
  .placeholder-text { font-size: 14px; line-height: 1.7; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; opacity: 0; white-space: nowrap; max-width: 88vw; overflow: hidden; text-overflow: ellipsis; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--error); color: var(--error); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-logo">AI LOG VIEWER</div>
  <div class="pw-title">パスワードを入力</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="password" autocomplete="off">
    <div class="pw-err" id="pw-err"></div>
    <button class="pw-btn" onclick="checkPassword()">ロック解除</button>
  </div>
</div>

<div class="topbar">
  <div class="menu-btn" id="menu-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
  <div class="topbar-title" id="topbar-title">AI会話ログ</div>
  <div class="topbar-actions">
    <input type="file" id="zipInput" accept=".zip" hidden>
    <button class="btn primary" onclick="zipInput.click()">ZIP読み込み</button>
    <button class="btn" onclick="clearAll()">全削除</button>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">保存済み一覧</div>
  <div id="file-list"></div>
</div>

<div class="main">
  <div id="viewer">
    <div class="placeholder">
      <div class="placeholder-icon">📂</div>
      <div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PASS         = "ai-shinan";
const SUPABASE_URL = "https://mtprohzzgfdohlxvfpwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_9jqBvmC7d8VxewxbzAHeYA_SoTmobit";
const TABLE        = "logs";

const BASE_HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`
};

// ── Supabase操作 ──
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { ...BASE_HEADERS, ...(options.headers || {}) },
    ...options
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt);
  }
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json") && res.status !== 204) return res.json();
  return null;
}

async function sbSelect() {
  return sbFetch(`${TABLE}?select=id,title,created_at&order=created_at.desc`);
}

async function sbSelectOne(id) {
  const rows = await sbFetch(`${TABLE}?id=eq.${id}&select=title,content`);
  return rows?.[0];
}

async function sbUpsert(title, content) {
  // 同タイトルがあれば上書き
  const existing = await sbFetch(`${TABLE}?title=eq.${encodeURIComponent(title)}&select=id`);
  if (existing && existing.length > 0) {
    await sbFetch(`${TABLE}?id=eq.${existing[0].id}`, {
      method: "PATCH",
      headers: { "Prefer": "return=minimal" },
      body: JSON.stringify({ content, created_at: new Date().toISOString() })
    });
  } else {
    await sbFetch(TABLE, {
      method: "POST",
      headers: { "Prefer": "return=minimal" },
      body: JSON.stringify({ title, content })
    });
  }
}

async function sbDeleteAll() {
  await sbFetch(`${TABLE}?id=gt.0`, {
    method: "DELETE",
    headers: { "Prefer": "return=minimal" }
  });
}

// ── パスワード ──
const pwScreen = document.getElementById("pw-screen");
const pwInput  = document.getElementById("pw-input");
const pwErr    = document.getElementById("pw-err");
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });

function checkPassword() {
  if (pwInput.value === PASS) {
    pwScreen.classList.add("hidden");
    setTimeout(() => pwScreen.style.display = "none", 300);
    loadList();
  } else {
    pwErr.textContent = "パスワードが違う";
    pwInput.classList.add("error");
    pwInput.value = "";
    setTimeout(() => { pwInput.classList.remove("error"); pwErr.textContent = ""; }, 1500);
  }
}

// ── UI ──
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menu-btn");
let menuOpen = false;

function toggleMenu() {
  menuOpen = !menuOpen;
  sidebar.classList.toggle("open", menuOpen);
  overlay.classList.toggle("open", menuOpen);
  menuBtn.classList.toggle("open", menuOpen);
}
function closeMenu() {
  menuOpen = false;
  sidebar.classList.remove("open");
  overlay.classList.remove("open");
  menuBtn.classList.remove("open");
}

let toastTimer;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 2800);
}

// ── ZIP処理 ──
document.getElementById("zipInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = "";
  showToast("読み込み中…");

  try {
    const zip = await JSZip.loadAsync(file);
    const innerZipNames = Object.keys(zip.files).filter(n => n.endsWith(".zip") && !zip.files[n].dir);
    let added = 0, failed = 0;

    if (innerZipNames.length === 0) {
      const txtNames = Object.keys(zip.files).filter(n => n.endsWith(".txt"));
      for (const name of txtNames) {
        try {
          const content = await zip.files[name].async("string");
          await sbUpsert(name.split("/").pop(), content);
          added++;
        } catch { failed++; }
      }
    } else {
      for (const innerName of innerZipNames) {
        try {
          const innerBlob = await zip.files[innerName].async("blob");
          const innerZip  = await JSZip.loadAsync(innerBlob);
          const title     = innerName.split("/").pop();
          const txtKeys   = Object.keys(innerZip.files).filter(n => n.endsWith(".txt"));
          let content = "";
          for (const tk of txtKeys) {
            const t = await innerZip.files[tk].async("string");
            content += (content ? "\n\n---\n\n" : "") + t;
          }
          if (content) { await sbUpsert(title, content); added++; }
        } catch { failed++; }
      }
    }

    if (added > 0) {
      showToast(`${added}件保存完了${failed ? "（" + failed + "件失敗）" : ""}`, "success");
    } else {
      showToast("保存できるファイルがなかった", "error");
    }
    await loadList();
  } catch (err) {
    console.error(err);
    showToast("ZIP読み込み失敗: " + err.message, "error");
  }
});

// ── 一覧 ──
let activeId = null;

async function loadList() {
  const list = document.getElementById("file-list");
  list.innerHTML = '<div class="sidebar-empty">読み込み中…</div>';
  try {
    const rows = await sbSelect();
    renderList(rows || []);
  } catch (err) {
    list.innerHTML = `<div class="sidebar-empty">読み込み失敗<br><small>${err.message}</small></div>`;
  }
}

function renderList(rows) {
  const list = document.getElementById("file-list");
  if (rows.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">まだ保存されてない<br>ZIPを読み込んでみて</div>';
    return;
  }
  list.innerHTML = "";
  rows.forEach(row => {
    const div = document.createElement("div");
    div.className = "file-item" + (row.id === activeId ? " active" : "");
    const dateStr = row.created_at
      ? new Date(row.created_at).toLocaleDateString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
      : "";
    div.innerHTML = `<div class="file-name">${escHtml(row.title)}</div><div class="file-date">${dateStr}</div>`;
    div.onclick = () => openLog(row.id, row.title, div);
    list.appendChild(div);
  });
}

async function openLog(id, title, div) {
  activeId = id;
  closeMenu();
  document.getElementById("topbar-title").textContent = title;
  document.getElementById("viewer").innerHTML = '<div class="placeholder"><div class="placeholder-icon">⏳</div><div class="placeholder-text">読み込み中…</div></div>';
  document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
  div.classList.add("active");

  try {
    const data = await sbSelectOne(id);
    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";
    const pre = document.createElement("div");
    pre.className = "viewer";
    pre.textContent = data?.content || "（内容なし）";
    viewer.appendChild(pre);
    document.querySelector(".main").scrollTop = 0;
  } catch (err) {
    showToast("読み込み失敗", "error");
  }
}

async function clearAll() {
  if (!confirm("全ての保存ログを削除する？")) return;
  try {
    await sbDeleteAll();
    activeId = null;
    document.getElementById("topbar-title").textContent = "AI会話ログ";
    document.getElementById("viewer").innerHTML = `<div class="placeholder"><div class="placeholder-icon">📂</div><div class="placeholder-text">ZIPを読み込むと<br>会話ログが表示される</div></div>`;
    await loadList();
    showToast("全削除完了", "success");
  } catch (err) {
    showToast("削除失敗: " + err.message, "error");
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
