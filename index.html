<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-SHINAN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --border:#2a2a3d;
  --text:#e8e8f0;
  --accent:#7b61ff;
}

/* ===== 全体 ===== */
body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== ロック ===== */
#lock{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
input{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
}
button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* ===== アプリ ===== */
#app{display:none; height:100vh;}

.layout{
  display:flex;
  height:100%;
}

/* ===== サイドバー ===== */
.sidebar{
  width:260px;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow:auto;
}

/* ===== メイン ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.viewer{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* ===== ファイル ===== */
.file{
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.file:hover{background:#1c1c28}

/* ===== 画像 ===== */
img{max-width:100%;}
iframe{width:100%;height:80vh;border:none;}

/* ===== スマホ対応 ===== */
@media (max-width:768px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:40vh;
  }

  .main{
    height:60vh;
  }

  button,input{
    font-size:16px;
  }
}
</style>
</head>

<body>

<!-- ロック -->
<div id="lock">
  <h2>AI-SHINAN</h2>
  <input id="pw" type="password" placeholder="password">
  <button onclick="unlock()">unlock</button>
</div>

<!-- 本体 -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <input type="file" id="file" multiple>
      <div id="list"></div>
    </div>

    <div class="main">
      <div class="viewer" id="viewer">ZIPを入れてね</div>
    </div>
  </div>
</div>

<script>
const PASSWORD = "AI-shinan";

let archives = {};

function unlock(){
  if(document.getElementById("pw").value === PASSWORD){
    document.getElementById("lock").style.display="none";
    document.getElementById("app").style.display="block";
  }
}

document.getElementById("file").addEventListener("change", e=>{
  [...e.target.files].forEach(loadZip);
});

async function loadZip(file){
  const zip = await JSZip.loadAsync(file);
  const name = file.name;

  archives[name] = {};

  zip.forEach(async (path, entry)=>{
    if(entry.dir) return;

    const ext = path.split(".").pop().toLowerCase();

    const type =
      ["png","jpg","jpeg","gif","webp"].includes(ext) ? "image" :
      ext === "pdf" ? "pdf" : "text";

    const data = await entry.async(type==="text"?"string":"base64");

    archives[name][path] = {name:path, type, data};
  });

  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  for(const zip in archives){
    for(const path in archives[zip]){
      const f = archives[zip][path];

      const el = document.createElement("div");
      el.className="file";
      el.textContent=f.name;

      el.onclick=()=>openFile(zip,path);

      list.appendChild(el);
    }
  }
}

function escape(s){
  return s.replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",
    '"':"&quot;","'":"&#39;"
  }[m]));
}

function openFile(zip,path){
  const f = archives[zip][path];
  const v = document.getElementById("viewer");

  v.innerHTML="";

  if(f.type==="text"){
    v.innerHTML=`<pre>${escape(f.data)}</pre>`;
  }

  if(f.type==="image"){
    const img=document.createElement("img");
    img.src="data:image/*;base64,"+f.data;
    v.appendChild(img);
  }

  if(f.type==="pdf"){
    const ifr=document.createElement("iframe");
    ifr.src="data:application/pdf;base64,"+f.data;
    v.appendChild(ifr);
  }
}
</script>

</body>
</html>
