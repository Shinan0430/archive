<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI会話ログ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { background:#0a0a0b; color:#e4e4e7; font-family:sans-serif; margin:0 }
button { padding:8px 12px; margin:4px }
#viewer { white-space:pre-wrap; padding:16px }
</style>
</head>
<body>

<input type="file" id="zipInput" accept=".zip">
<button onclick="loadList()">再読込</button>
<div id="viewer">ここに表示</div>

<script>
const SUPABASE_URL = "https://mtprohzzgfdohlxvfpwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_9jqBvmC7d8VxewxbzAHeYA_SoTmobit";
const TABLE = "logs";

const HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`
};

// ===== 共通 =====
async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { ...HEADERS, ...(options.headers||{}) },
    ...options
  });

  if (!res.ok) {
    const txt = await res.text();
    console.error("SB ERROR:", txt);
    throw new Error(txt);
  }

  if (res.status !== 204) return res.json();
}

// ===== 保存 =====
async function sbUpsert(title, content) {
  try {
    const existing = await sbFetch(`${TABLE}?title=eq.${title}&select=id`);

    if (existing.length > 0) {
      await sbFetch(`${TABLE}?id=eq.${existing[0].id}`, {
        method:"PATCH",
        body: JSON.stringify({
          content,
          created_at: new Date().toISOString()
        })
      });
    } else {
      await sbFetch(TABLE, {
        method:"POST",
        body: JSON.stringify({
          title,
          content,
          created_at: new Date().toISOString()
        })
      });
    }
  } catch(e) {
    console.error("UPSERT:", e);
  }
}

// ===== 一覧 =====
async function loadList() {
  try {
    const rows = await sbFetch(`${TABLE}?select=title,created_at&order=created_at.desc`);
    document.getElementById("viewer").textContent =
      rows.map(r => `${r.title} (${r.created_at})`).join("\n") || "データなし";
  } catch(e) {
    console.error(e);
  }
}

// ===== ZIP =====
document.getElementById("zipInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if (!file) return;

  try {
    const zip = await JSZip.loadAsync(file);
    const files = Object.keys(zip.files).filter(n=>n.endsWith(".txt"));

    let added = 0;

    for (const name of files) {
      try {
        const content = await zip.files[name].async("string");
        await sbUpsert(name.split("/").pop(), content || "（空）");
        added++;
      } catch(e) {
        console.error("TXT:", e);
      }
    }

    alert(`保存: ${added}`);
    loadList();

  } catch(e) {
    console.error("ZIP:", e);
  }
});
</script>

</body>
</html>
